<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SA Architect Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/tabler-icons.min.css" media="print" onload="this.media='all'">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600&display=swap" media="print" onload="this.media='all'">
</head>
<body>
<div id="app">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#F6F2EA;font-family:system-ui,sans-serif;color:#5C5448">
    <div style="text-align:center"><div style="width:40px;height:40px;border:3px solid #E4DDD0;border-top-color:#0F6E56;border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 16px"></div>Загрузка…</div>
  </div>
</div>
<style>@keyframes sp{to{transform:rotate(360deg)}}</style>

<style>
:root{
  --paper:#F6F2EA;--paper-2:#FBF8F2;--card:#FFFFFF;
  --ink:#211C15;--ink-2:#5C5448;--ink-3:#938B7C;
  --line:#E4DDD0;--line-2:#D2C9B8;
  --teal:#0F6E56;--teal-soft:#E1F1EB;--teal-deep:#0A4E3D;
  --amber:#A8650F;--amber-soft:#F6E9D5;
  --plum:#5B4A8A;--plum-soft:#ECE7F5;
  --blue:#1B5E96;--blue-soft:#E1ECF5;
  --done:#1D8A68;--review:#A8650F;--changes:#B5402F;--changes-soft:#F6E2DD;
  --font-d:'Fraunces',Georgia,serif;--font-b:'Hanken Grotesk',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--paper);color:var(--ink);font-family:var(--font-b);-webkit-font-smoothing:antialiased}
#app{min-height:100vh}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.shell{max-width:920px;margin:0 auto;padding:0 24px}
.btn{font-family:var(--font-b);font-size:14px;font-weight:500;padding:10px 18px;border-radius:10px;border:1px solid var(--line-2);background:var(--card);color:var(--ink);cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:7px}
.btn:hover{border-color:var(--ink-3);transform:translateY(-1px)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-primary{background:var(--ink);color:var(--paper-2);border-color:var(--ink)}
.btn-primary:hover{background:#000}
.btn-ok{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-ok:hover{background:var(--teal-deep)}
.btn-warn{background:var(--changes-soft);color:var(--changes);border-color:#E6C3BB}
.btn-warn:hover{border-color:var(--changes)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--ink-2)}
.btn-ghost:hover{background:var(--paper);transform:none}
.btn-sm{padding:7px 13px;font-size:13px}
.tag{font-size:11px;font-weight:600;letter-spacing:.03em;padding:3px 9px;border-radius:6px;display:inline-flex;align-items:center;gap:4px}

/* status badge */
.st{font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.st-progress{background:var(--paper);color:var(--ink-2);border:1px solid var(--line)}
.st-review{background:var(--amber-soft);color:var(--amber)}
.st-done{background:var(--teal-soft);color:var(--teal-deep)}
.st-changes{background:var(--changes-soft);color:var(--changes)}

/* landing */
.land{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.land-eyebrow{font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);margin-bottom:18px}
.land h1{font-family:var(--font-d);font-weight:500;font-size:clamp(32px,6vw,54px);line-height:1.05;letter-spacing:-.01em;max-width:14ch;margin-bottom:10px}
.land h1 em{font-style:italic;color:var(--teal)}
.land p.lead{font-size:16px;color:var(--ink-2);max-width:46ch;line-height:1.6;margin-bottom:40px}
.roles{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;width:100%;max-width:560px}
.role{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:28px 24px;cursor:pointer;text-align:left;transition:.2s;position:relative;overflow:hidden}
.role:hover{border-color:var(--ink);transform:translateY(-3px);box-shadow:0 12px 30px -18px rgba(33,28,21,.4)}
.role-ic{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:16px}
.role h3{font-family:var(--font-d);font-weight:500;font-size:21px;margin-bottom:6px}
.role p{font-size:13.5px;color:var(--ink-2);line-height:1.55}
.role-arrow{position:absolute;top:24px;right:24px;color:var(--ink-3);transition:.2s}
.role:hover .role-arrow{color:var(--ink);transform:translateX(3px)}
@media(max-width:560px){.roles{grid-template-columns:1fr}}

/* topbar */
.topbar{border-bottom:1px solid var(--line);background:var(--paper-2);position:sticky;top:0;z-index:50}
.topbar-in{max-width:920px;margin:0 auto;padding:13px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:11px;cursor:pointer}
.brand-mark{width:30px;height:30px;border-radius:8px;background:var(--ink);color:var(--paper-2);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-weight:600;font-size:15px}
.brand-txt{font-family:var(--font-d);font-weight:500;font-size:16px;line-height:1.1}
.brand-txt small{display:block;font-family:var(--font-b);font-size:11px;font-weight:400;color:var(--ink-3)}
.topright{display:flex;align-items:center;gap:14px}
.sync{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-3)}
.sync i{font-size:14px}
.sync.ok{color:var(--done)}.sync.saving{color:var(--amber)}.sync.off{color:var(--changes)}
.who{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--ink-2)}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--teal-soft);color:var(--teal-deep);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px}

.banner{background:var(--changes-soft);border:1px solid #E6C3BB;color:var(--changes);font-size:13px;line-height:1.5;padding:12px 16px;border-radius:12px;margin:18px 0 0;display:flex;gap:10px;align-items:flex-start}
.banner i{flex-shrink:0;margin-top:1px}

/* dash */
.hero{padding:30px 0 22px}
.hero h2{font-family:var(--font-d);font-weight:500;font-size:28px;letter-spacing:-.01em;margin-bottom:6px}
.hero p{font-size:14.5px;color:var(--ink-2)}
.ringwrap{display:flex;align-items:center;gap:26px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px 28px;flex-wrap:wrap}
.ring{position:relative;width:108px;height:108px;flex-shrink:0}
.ring svg{transform:rotate(-90deg)}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-family:var(--font-d);font-weight:600;font-size:26px;line-height:1}
.ring-sub{font-size:10.5px;color:var(--ink-3);margin-top:2px}
.ring-meta{flex:1;min-width:200px}
.ring-meta h4{font-family:var(--font-d);font-weight:500;font-size:18px;margin-bottom:4px}
.ring-meta p{font-size:13px;color:var(--ink-2);line-height:1.55}
.stagepill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px;margin-top:10px;background:var(--teal-soft);color:var(--teal-deep)}

.phase-grid{display:flex;flex-direction:column;gap:14px;padding:18px 0 50px}
.pcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 22px;cursor:pointer;transition:.18s}
.pcard:hover{border-color:var(--ink-3);transform:translateY(-2px);box-shadow:0 10px 26px -20px rgba(33,28,21,.45)}
.pcard-head{display:flex;align-items:flex-start;gap:14px}
.pnum{width:40px;height:40px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-weight:600;font-size:17px}
.pcard-body{flex:1;min-width:0}
.pcard-toprow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:5px}
.pcard h3{font-family:var(--font-d);font-weight:500;font-size:18px}
.pcard .pdesc{font-size:13px;color:var(--ink-2);line-height:1.55;margin-bottom:14px}
.pbar-track{height:6px;border-radius:999px;background:var(--paper);overflow:hidden;border:1px solid var(--line)}
.pbar-fill{height:100%;border-radius:999px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.pbar-meta{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.pbar-meta span{font-size:11.5px;color:var(--ink-3)}

/* detail */
.detail-head{padding:26px 0 14px}
.crumb{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ink-2);cursor:pointer;margin-bottom:16px;width:fit-content}
.crumb:hover{color:var(--ink)}
.detail-banner{display:flex;align-items:flex-start;gap:16px}
.detail-banner .pnum{width:48px;height:48px;font-size:20px}
.detail-banner h2{font-family:var(--font-d);font-weight:500;font-size:25px;letter-spacing:-.01em;margin-bottom:6px}
.detail-banner .meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.sec{margin:28px 0}
.sec-title{font-family:var(--font-d);font-weight:500;font-size:18px;margin-bottom:4px;display:flex;align-items:center;gap:9px}
.sec-hint{font-size:12.5px;color:var(--ink-3);margin-bottom:14px}
.obj{display:flex;align-items:flex-start;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px 16px;margin-bottom:9px;cursor:pointer;transition:.15s}
.obj:hover{border-color:var(--line-2)}
.obj.on{background:var(--teal-soft);border-color:#BFE0D4}
.obj.lock{cursor:default;opacity:.92}
.ck{width:22px;height:22px;border-radius:7px;border:2px solid var(--line-2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:.15s;background:var(--paper-2)}
.obj.on .ck{background:var(--done);border-color:var(--done)}
.obj.on .ck::after{content:'✓';color:#fff;font-size:13px;font-weight:700}
.obj-tx{flex:1;font-size:14px;line-height:1.55}
.obj-tx b{font-weight:600}
.obj.on .obj-tx{color:var(--teal-deep)}
.bloom{font-size:10px;font-weight:600;padding:3px 8px;border-radius:999px;background:var(--paper);border:1px solid var(--line);color:var(--ink-3);white-space:nowrap;flex-shrink:0;margin-top:1px}
.pract{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 17px;margin-bottom:9px}
.pract h4{font-size:14px;font-weight:600;margin-bottom:4px}
.pract p{font-size:13px;color:var(--ink-2);line-height:1.55}
.pract .ptime{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--ink-3);margin-top:8px}

/* evidence */
.ev-empty{font-size:13px;color:var(--ink-3);background:var(--paper-2);border:1px dashed var(--line-2);border-radius:12px;padding:16px;text-align:center}
.ev-item{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 14px;margin-bottom:8px}
.ev-ic{width:32px;height:32px;border-radius:8px;background:var(--amber-soft);color:var(--amber);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ev-body{flex:1;min-width:0}
.ev-body a{font-size:13.5px;font-weight:500;color:var(--ink);text-decoration:none;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-body a:hover{color:var(--teal-deep);text-decoration:underline}
.ev-body small{font-size:11.5px;color:var(--ink-3);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-del{color:var(--ink-3);cursor:pointer;flex-shrink:0;padding:4px}
.ev-del:hover{color:var(--changes)}
.ev-add{display:flex;flex-direction:column;gap:8px;background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:10px}
.ev-add input{font-family:var(--font-b);font-size:13.5px;padding:10px 12px;border:1px solid var(--line-2);border-radius:9px;background:var(--card);outline:none;color:var(--ink);width:100%}
.ev-add input:focus{border-color:var(--teal)}

/* review panel */
.rev{border-radius:14px;padding:18px 20px;margin:26px 0}
.rev-progress{background:var(--paper-2);border:1px dashed var(--line-2)}
.rev-review{background:var(--amber-soft);border:1px solid #E8D3AE}
.rev-done{background:var(--teal-soft);border:1px solid #BFE0D4}
.rev-changes{background:var(--changes-soft);border:1px solid #E6C3BB}
.rev h4{font-size:14.5px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.rev p{font-size:13px;line-height:1.55;color:var(--ink-2);margin-bottom:4px}
.rev .note{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:13px;line-height:1.55;margin:10px 0;color:var(--ink)}
.rev .by{font-size:11.5px;color:var(--ink-3);margin-top:6px}
.gate{font-size:12.5px;color:var(--ink-3);margin-top:10px;display:flex;align-items:center;gap:6px}
.detail-nav{display:flex;gap:10px;margin:24px 0 50px;align-items:center}

/* manager */
.mgr-head{padding:28px 0 18px}
.mgr-head h2{font-family:var(--font-d);font-weight:500;font-size:26px;margin-bottom:5px}
.mgr-head p{font-size:14px;color:var(--ink-2)}
.mgr-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.mstat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.mstat.hl{background:var(--amber-soft);border-color:#E8D3AE}
.mstat .v{font-family:var(--font-d);font-weight:600;font-size:24px;line-height:1}
.mstat.hl .v{color:var(--amber)}
.mstat .l{font-size:11.5px;color:var(--ink-3);margin-top:6px}
.mstat.hl .l{color:var(--amber)}
@media(max-width:620px){.mgr-stats{grid-template-columns:repeat(2,1fr)}}
.queue{background:var(--card);border:1px solid #E8D3AE;border-radius:16px;padding:18px 20px;margin-bottom:24px}
.queue h3{font-family:var(--font-d);font-weight:500;font-size:17px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.queue .sub{font-size:12.5px;color:var(--ink-3);margin-bottom:14px}
.qitem{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--line)}
.qitem .avatar{width:34px;height:34px;font-size:13px;background:var(--amber-soft);color:var(--amber)}
.qitem-body{flex:1;min-width:0}
.qitem-name{font-weight:600;font-size:14px}
.qitem-sub{font-size:12px;color:var(--ink-3)}
.sectdiv{font-family:var(--font-d);font-size:15px;color:var(--ink-2);margin:6px 0 12px}
.ppl{display:flex;flex-direction:column;gap:11px;padding-bottom:50px}
.prow{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;cursor:pointer;transition:.15s}
.prow:hover{border-color:var(--ink-3)}
.prow-top{display:flex;align-items:center;gap:13px;margin-bottom:12px}
.prow .avatar{width:38px;height:38px;font-size:14px}
.prow-name{font-weight:600;font-size:15px}
.prow-sub{font-size:12px;color:var(--ink-3)}
.prow-pct{margin-left:auto;font-family:var(--font-d);font-weight:600;font-size:20px}
.seg{display:flex;gap:5px}
.seg-item{flex:1}
.seg-bar{height:8px;border-radius:4px;background:var(--paper);border:1px solid var(--line);overflow:hidden;position:relative}
.seg-bar-fill{position:absolute;inset:0;border-radius:3px;transition:width .5s}
.seg-bar.appr{border-color:var(--done)}
.seg-lab{font-size:9.5px;color:var(--ink-3);margin-top:5px;text-align:center;display:flex;align-items:center;justify-content:center;gap:3px}
.empty{text-align:center;padding:56px 20px;color:var(--ink-3)}
.empty i{font-size:38px;display:block;margin-bottom:14px;opacity:.5}
.empty p{font-size:14px;line-height:1.6;max-width:36ch;margin:0 auto}

/* modal */
.modal-bg{position:absolute;inset:0;min-height:100vh;background:rgba(33,28,21,.4);display:flex;align-items:center;justify-content:center;padding:24px;z-index:100}
.modal{background:var(--card);border-radius:20px;padding:28px 30px 26px;max-width:440px;width:100%}
.modal h3{font-family:var(--font-d);font-weight:500;font-size:22px;margin-bottom:6px}
.modal p{font-size:13.5px;color:var(--ink-2);line-height:1.55;margin-bottom:18px}
.modal input,.modal textarea{width:100%;font-family:var(--font-b);font-size:15px;padding:12px 14px;border:1px solid var(--line-2);border-radius:11px;background:var(--paper-2);margin-bottom:14px;outline:none;color:var(--ink)}
.modal textarea{resize:vertical;min-height:80px;font-size:14px}
.modal input:focus,.modal textarea:focus{border-color:var(--teal)}
.existing-lab{font-size:11.5px;color:var(--ink-3);margin-bottom:8px}
.chiprow{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.chip{font-size:12.5px;padding:6px 12px;border-radius:999px;border:1px solid var(--line-2);background:var(--paper-2);cursor:pointer;transition:.15s}
.chip:hover{border-color:var(--teal);color:var(--teal-deep)}
.loading{min-height:100vh;display:flex;align-items:center;justify-content:center;color:var(--ink-3);font-size:14px;gap:10px}
.spin{width:18px;height:18px;border:2px solid var(--line-2);border-top-color:var(--teal);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--paper-2);font-size:13px;padding:10px 18px;border-radius:999px;z-index:200;transition:.3s;opacity:0}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.fade{animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* diagnostic */
.diag-head{padding:28px 0 6px}
.diag-head h2{font-family:var(--font-d);font-weight:500;font-size:26px;letter-spacing:-.01em;margin-bottom:8px}
.diag-head p{font-size:14px;color:var(--ink-2);line-height:1.6;max-width:60ch}
.diag-note{background:var(--amber-soft);border:1px solid #E8D3AE;color:#7A4A0A;font-size:12.5px;line-height:1.55;padding:11px 14px;border-radius:11px;margin:14px 0 4px;display:flex;gap:9px;align-items:flex-start}
.diag-note i{flex-shrink:0;margin-top:1px}
.diag-area{margin:22px 0 4px}
.diag-area-h{display:flex;align-items:center;gap:9px;font-family:var(--font-d);font-size:16px;font-weight:500;margin-bottom:10px}
.dnum{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.drow{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:8px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.drow-tx{flex:1;min-width:200px;font-size:13.5px;line-height:1.5}
.drow-tx b{font-weight:600}
.seg3{display:flex;gap:0;border:1px solid var(--line-2);border-radius:9px;overflow:hidden;flex-shrink:0}
.seg3 button{font-family:var(--font-b);font-size:12px;font-weight:500;padding:7px 12px;border:none;background:var(--paper-2);color:var(--ink-2);cursor:pointer;transition:.12s;border-right:1px solid var(--line)}
.seg3 button:last-child{border-right:none}
.seg3 button:hover{background:var(--paper)}
.seg3 button.on-yes{background:var(--teal);color:#fff}
.seg3 button.on-partial{background:var(--amber);color:#fff}
.seg3 button.on-no{background:var(--ink-3);color:#fff}
.diag-foot{position:sticky;bottom:0;background:var(--paper-2);border-top:1px solid var(--line);margin-top:18px;padding:14px 0;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.diag-foot .cnt{font-size:13px;color:var(--ink-2)}
.diag-foot .cnt b{color:var(--ink);font-weight:600}

/* review form (manager) */

function rowToRec(row){return {uid:row.user_id,name:row.name||'',checked:row.checked||{},evidence:row.evidence||{},status:row.status||{},review:row.review||{},baseline:row.baseline||null,baselinePct:(row.baseline_pct==null?null:row.baseline_pct),started:Number(row.started)||Date.now(),updated:Number(row.updated)||Date.now()};}
function recToRow(r){return {user_id:r.uid,name:r.name,checked:r.checked,evidence:r.evidence,status:r.status,review:r.review,baseline:r.baseline,baseline_pct:r.baselinePct,started:r.started,updated:Date.now()};}

async function dbLoadMine(){ try{const {data,error}=await SB.from('progress').select('*').eq('user_id',state.uid).maybeSingle();if(error){console.error(error);return null;}return data?rowToRec(data):null;}catch(e){console.error(e);return null;} }
async function dbLoadOne(uid){ try{const {data}=await SB.from('progress').select('*').eq('user_id',uid).maybeSingle();return data?rowToRec(data):null;}catch(e){return null;} }
async function dbLoadRoster(){ try{const {data,error}=await SB.from('progress').select('*');if(error){console.error(error);return [];}return (data||[]).map(rowToRec);}catch(e){return [];} }
async function dbSave(rec){ try{const {error}=await SB.from('progress').upsert(recToRow(rec),{onConflict:'user_id'});if(error){console.error(error);return false;}rec.updated=Date.now();return true;}catch(e){console.error(e);return false;} }
async function dbIsReviewer(){ try{const {data}=await SB.from('reviewers').select('user_id').eq('user_id',state.uid).maybeSingle();return !!data;}catch(e){return false;} }
async function loadRoster(){ return await dbLoadRoster(); }

function toast(m){let t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.className='toast';document.body.appendChild(t);}t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1900);}
function setSync(s){state.syncing=s==='saving';state.syncFail=s==='off';const el=document.getElementById('syncPill');if(el)el.outerHTML=syncPill();}
function syncPill(){
  if(DEMO)return `<span class="sync off" id="syncPill"><i class="ti ti-eye"></i>демо</span>`;
  if(!DBLIVE)return `<span class="sync off" id="syncPill"><i class="ti ti-cloud-off"></i>не настроено</span>`;
  if(state.syncing)return `<span class="sync saving" id="syncPill"><i class="ti ti-loader-2"></i>сохраняю…</span>`;
  if(state.syncFail)return `<span class="sync off" id="syncPill"><i class="ti ti-cloud-off"></i>не сохранилось</span>`;
  return `<span class="sync ok" id="syncPill"><i class="ti ti-cloud-check"></i>сохранено</span>`;
}

let saveTimer=null;
function queueSave(){
  if(!state.rec)return;
  if(DEMO){toast('Демо-режим — изменения не сохраняются');return;}
  setSync('saving');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    const ok=await dbSave(state.rec);
    setSync(ok?'ok':'off');
  },350);
}

function go(v,ex={}){Object.assign(state,{view:v},ex);render();window.scrollTo(0,0);}
function loadingHTML(m){return `<div class="loading"><div class="spin"></div>${m}</div>`;}

      </div>
    </div>
  </div>`;
  setTimeout(()=>{const e=document.getElementById('liEmail');if(e){e.focus();const pw=document.getElementById('liPw');pw.onkeydown=ev=>{if(ev.key==='Enter')doLogin();};}},50);

window.doLogin=async function(){
  const email=(document.getElementById('liEmail').value||'').trim();
  const pw=document.getElementById('liPw').value||'';
  if(!email||!pw){toast('Введи логин и пароль');return;}
  root().innerHTML=loadingHTML('Вхожу…');
  try{
    const {error}=await SB.auth.signInWithPassword({email,password:pw});
    if(error){toast('Неверный логин или пароль');renderLogin();return;}
    await afterLogin();
  }catch(e){toast('Нет связи с базой');renderLogin();}
};
async function afterLogin(){
  root().innerHTML=loadingHTML('Загружаю…');
  const {data}=await SB.auth.getUser();
  const user=data&&data.user; if(!user){renderLogin();return;}
  state.uid=user.id; state.email=user.email;
  state.isReviewer=await dbIsReviewer();
  if(state.isReviewer){ state.role='manager'; state.mgr=user.email; state.roster=await dbLoadRoster(); go('manager'); return; }
  state.role='analyst';
  const rec=await dbLoadMine();
  if(!rec){ renderFirstTime(); return; }
  state.name=rec.name||user.email; state.rec=rec; go('dash');
}
function renderFirstTime(){
  root().innerHTML=`<div class="modal-bg fade"><div class="modal">
    <h3>Как тебя показывать?</h3>
    <p>Имя и фамилия — так тебя увидит руководитель в сводке. Логин остаётся прежним.</p>
    <input id="ftName" placeholder="Имя и фамилия" autocomplete="name"/>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="createMine()">Начать диагностику <i class="ti ti-arrow-right"></i></button>
  </div></div>`;
  setTimeout(()=>{const i=document.getElementById('ftName');if(i){i.focus();i.onkeydown=e=>{if(e.key==='Enter')createMine();};}},50);
}
window.createMine=async function(){
  const name=(document.getElementById('ftName').value||'').trim();
  if(name.length<2){toast('Введи имя');return;}
  state.name=name; state.rec=blankRec(name,state.uid);
  root().innerHTML=loadingHTML('Создаю профиль…');
  await dbSave(state.rec);
  state._diag={}; go('diag');
};
window.signOut=async function(){
  try{await SB.auth.signOut();}catch(e){}
  state={view:'login',role:null,uid:null,email:null,isReviewer:false,name:null,mgr:'',rec:null,phase:null,roster:[],syncing:false,syncFail:false};
  renderLogin();
};
window.exitDemo=function(){location.hash='';location.reload();};
window.goHome=function(){ if(state.role==='manager')go('manager'); else go('dash'); };
async function boot(){
  const h=location.hash.replace('#','');
  if(h==='demo'){bootDemo(false);return;}
  if(h==='demo-mgr'){bootDemo(true);return;}
  if(!DBLIVE){ renderConfigError(); return; }
  root().innerHTML=loadingHTML('Подключаюсь…');
  try{
    const {data}=await SB.auth.getSession();
    if(data&&data.session){ await afterLogin(); } else { renderLogin(); }
  }catch(e){ toast('Нет связи с базой'); renderLogin(); }
}

/* ---------- demo mode ---------- */
function demoRec(name,uid,profile){
  const r=blankRec(name,uid);
  r.started=Date.now()-profile.days*86400000;
  if(profile.diag){r.baseline=profile.diag;r.baselinePct=Math.round(Object.values(profile.diag).filter(v=>v==='yes').length/TOTAL*100);}
  (profile.checked||[]).forEach(id=>{r.checked[id]=true;});
  (profile.evidence||[]).forEach(([pid,evs])=>{r.evidence[pid]=evs;});
  (profile.statuses||[]).forEach(([pid,st])=>{r.status[pid]=st;});
  (profile.reviews||[]).forEach(([pid,rv])=>{r.review[pid]=rv;});
  return r;
}

function rvFeedbackHTML(rv,p){
  if(!rv||(!rv.objectives&&!rv.note))return '';
  let html='';
  if(rv.objectives){
    const objs=p.objectives.filter(o=>rv.objectives[o.id]);
    const fails=objs.filter(o=>!rv.objectives[o.id].ok);
    if(fails.length){
      html+=`<div style="margin-top:10px"><div style="font-size:12px;font-weight:600;color:var(--ink-3);margin-bottom:6px">Замечания по целям:</div>`;
      fails.forEach(o=>{const f=rv.objectives[o.id];html+=`<div class="rv-fb rv-fb-fail"><i class="ti ti-x" style="font-size:12px"></i> <b>${o.verb}</b> ${o.text}${f.comment?' — '+esc(f.comment):''}</div>`;});
      html+=`</div>`;
    }
  }
  if(rv.artifacts){
    const artFails=Object.keys(rv.artifacts).filter(i=>!rv.artifacts[i].ok);
    if(artFails.length){
      html+=`<div style="margin-top:8px"><div style="font-size:12px;font-weight:600;color:var(--ink-3);margin-bottom:6px">Замечания по артефактам:</div>`;
      const ev=p.id!=null?(state.rec.evidence[p.id]||[]):[];
      artFails.forEach(i=>{const a=rv.artifacts[i];const e=ev[i];html+=`<div class="rv-fb rv-fb-fail"><i class="ti ti-x" style="font-size:12px"></i> ${e?esc(e.label||e.url):'Артефакт '+(+i+1)}${a.comment?' — '+esc(a.comment):''}</div>`;});
      html+=`</div>`;
    }
  }
  return html;
}
function reviewPanel(r,p,st){
  const ev=r.evidence[p.id]||[];
  const rv=r.review[p.id];
  if(st==='done'){
    return `<div class="rev rev-done"><h4><i class="ti ti-circle-check" style="color:var(--done)"></i> Этап принят</h4>
    ${rv&&rv.note?`<div class="note">${esc(rv.note)}</div>`:''}${rvFeedbackHTML(rv,p)}<div class="by">Принял: ${esc(rv?rv.by:'—')}${rv&&rv.at?' · '+timeAgo(rv.at):''}</div></div>`;
  }
  if(st==='review'){
    return `<div class="rev rev-review"><h4><i class="ti ti-clock-hour-4" style="color:var(--amber)"></i> На ревью у руководителя</h4>
    <p>Этап отправлен на проверку. Отметки и артефакты заморожены до решения ревьюера.</p>
    <button class="btn btn-sm" style="margin-top:10px" onclick="recallPhase(${p.id})"><i class="ti ti-arrow-back-up"></i> Отозвать с ревью</button></div>`;
  }
  const objOk=allDoneInPhase(r,p),evOk=ev.length>0;
  const ready=objOk&&evOk;
  let panel=`<div class="rev ${st==='changes'?'rev-changes':'rev-progress'}">`;
  if(st==='changes'&&rv){
    panel+=`<h4><i class="ti ti-arrow-back-up" style="color:var(--changes)"></i> Возвращено на доработку</h4>
    ${rv.note?`<div class="note">${esc(rv.note)}</div>`:'<p>Ревьюер вернул этап без комментария.</p>'}${rvFeedbackHTML(rv,p)}<div class="by">Вернул: ${esc(rv.by)}${rv.at?' · '+timeAgo(rv.at):''}</div>`;
  }else{
    panel+=`<h4><i class="ti ti-send" style="color:var(--teal)"></i> Отправка на ревью</h4><p>Когда все цели закрыты и приложены артефакты — отправь этап руководителю на проверку.</p>`;
  }
  panel+=`<div class="gate"><i class="ti ti-${objOk?'circle-check':'circle'}" style="color:${objOk?'var(--done)':'var(--ink-3)'}"></i> все цели отмечены (${phaseDone(r,p)}/${p.objectives.length})</div>
  <div class="gate"><i class="ti ti-${evOk?'circle-check':'circle'}" style="color:${evOk?'var(--done)':'var(--ink-3)'}"></i> приложен хотя бы один артефакт (${ev.length})</div>

  return panel;
}

window.addEvidence=function(pid){

  if(!/^https?:\/\//i.test(url))url='https://'+url;

function renderManager(){

  const n=roster.length;
  const avg=n?Math.round(roster.reduce((s,r)=>s+countAll(r),0)/(n*TOTAL)*100):0;
  const pending=[];roster.forEach(r=>PHASES.forEach(p=>{if(phStatus(r,p)==='review')pending.push({r,p});}));
  const fullyAppr=roster.filter(r=>approvedCount(r)===PHASES.length).length;
  const sorted=roster.slice().sort((a,b)=>approvedCount(b)-approvedCount(a)||countAll(b)-countAll(a));
  let queue='';
  if(pending.length){
    queue=`<div class="queue"><h3><i class="ti ti-inbox" style="color:var(--amber)"></i> Ждут вашего ревью</h3><div class="sub">${pending.length} ${plural(pending.length,'этап','этапа','этапов')} на проверке</div>
    ${pending.map(({r,p})=>`<div class="qitem"><div class="avatar">${initials(r.name)}</div><div class="qitem-body"><div class="qitem-name">${esc(r.name)}</div><div class="qitem-sub">Этап ${p.id+1} · ${p.name} · ${(r.evidence[p.id]||[]).length} артефакт.</div></div><button class="btn btn-sm" onclick="reviewOpen('${esc(r.name).replace(/'/g,"\\'")}',${p.id})"><i class="ti ti-eye"></i> Проверить</button></div>`).join('')}</div>`;
  }
  let body;
  if(!n){body=`<div class="empty"><i class="ti ti-users"></i><p>${DBLIVE?'Пока никто не начал маршрут. Как только аналитики войдут и отметят первые цели, они появятся здесь.':'База не настроена — данные аналитиков не подгружаются.'}</p></div>`;}
  else{
    body=`<div class="sectdiv">Команда</div><div class="ppl">${sorted.map(r=>{
      const tot=countAll(r),pct=Math.round(tot/TOTAL*100),ap=approvedCount(r);
      const curr=PHASES.find(p=>phStatus(r,p)!=='done');
      const stage=ap===PHASES.length?'Маршрут принят':('Этап '+(curr.id+1)+' · '+curr.name);
      return `<div class="prow" onclick="mgrPerson('${r.uid}')">
        <div class="prow-top"><div class="avatar">${initials(r.name)}</div><div><div class="prow-name">${esc(r.name)}</div><div class="prow-sub">${stage} · принято ${ap}/${PHASES.length}${r.baselinePct!=null?' · старт '+r.baselinePct+'%':''}</div></div><div class="prow-pct" style="color:${pct===100?'var(--done)':'var(--ink)'}">${pct}%</div></div>
        <div class="seg">${PHASES.map(p=>{const cc=phaseDone(r,p),tt=p.objectives.length,A=ACCENT[p.accent],st=phStatus(r,p);return `<div class="seg-item"><div class="seg-bar ${st==='done'?'appr':''}"><div class="seg-bar-fill" style="width:${Math.round(cc/tt*100)}%;background:${st==='done'?'var(--done)':A.bar}"></div></div><div class="seg-lab">${st==='review'?'<i class="ti ti-clock-hour-4" style="font-size:10px;color:var(--amber)"></i>':st==='changes'?'<i class="ti ti-arrow-back-up" style="font-size:10px;color:var(--changes)"></i>':st==='done'?'<i class="ti ti-check" style="font-size:10px;color:var(--done)"></i>':cc+'/'+tt}</div></div>`;}).join('')}</div>
      </div>`;}).join('')}</div>`;
  }
  root().innerHTML=topbar()+`<div class="shell fade">${offlineBanner()}
    <div class="mgr-head"><h2>Прогресс команды</h2><p>Кто на каком этапе пути от аналитика к архитектору</p></div>
    <div class="mgr-stats">
      <div class="mstat"><div class="v">${n}</div><div class="l">в маршруте</div></div>
      <div class="mstat ${pending.length?'hl':''}"><div class="v">${pending.length}</div><div class="l">на ревью</div></div>
      <div class="mstat"><div class="v">${avg}%</div><div class="l">средний прогресс</div></div>
      <div class="mstat"><div class="v">${fullyAppr}</div><div class="l">прошли полностью</div></div>
    </div>
    ${queue}${body}
    <div style="padding-bottom:50px"><button class="btn btn-sm" onclick="refreshMgr()"><i class="ti ti-refresh"></i> Обновить</button></div>
  </div>`;
}
function plural(n,a,b,c){const m=n%100,d=n%10;if(m>=11&&m<=14)return c;if(d===1)return a;if(d>=2&&d<=4)return b;return c;}
window.refreshMgr=async function(){if(DEMO){toast('Демо-режим — данные тестовые');render();return;}root().innerHTML=loadingHTML('Обновляю…');state.roster=await loadRoster();render();};
window.mgrPerson=function(uid){const r=state.roster.find(x=>x.uid===uid);if(r)go('mgrDetail',{rec:r});};
window.reviewOpen=function(name,pid){
  const r=state.roster.find(x=>x.name===name);
  if(!r)return;
  const p=PHASES[pid],ev=r.evidence[pid]||[];
  state._rvDraft={uid:r.uid,pid,objectives:{},artifacts:{}};
  p.objectives.forEach(o=>{state._rvDraft.objectives[o.id]={ok:null,comment:''};});
  ev.forEach((_,i)=>{state._rvDraft.artifacts[i]={ok:null,comment:''};});
  go('review',{rec:r,phase:pid});
};
window.openReviewFromDetail=function(uid,pid){
  const r=state.roster.find(x=>x.uid===uid);
  if(!r)return;
  const p=PHASES[pid],ev=r.evidence[pid]||[];
  state._rvDraft={uid:r.uid,pid,objectives:{},artifacts:{}};
  p.objectives.forEach(o=>{state._rvDraft.objectives[o.id]={ok:null,comment:''};});
  ev.forEach((_,i)=>{state._rvDraft.artifacts[i]={ok:null,comment:''};});
  go('review',{rec:r,phase:pid});
};

/* ---------- review screen (manager) ---------- */
function renderReview(){
  const r=state.rec,pid=state.phase,p=PHASES[pid],A=ACCENT[p.accent];
  const ev=r.evidence[pid]||[];
  const d=state._rvDraft;
  const allObj=p.objectives.every(o=>d.objectives[o.id]&&d.objectives[o.id].ok===true);
  const allArt=ev.every((_,i)=>d.artifacts[i]&&d.artifacts[i].ok===true);
  const canApprove=allObj&&allArt&&ev.length>0;

  root().innerHTML=topbar()+`<div class="shell fade">${offlineBanner()}
    <div class="detail-head">
      <div class="crumb" onclick="go('mgrDetail',{rec:state.roster.find(x=>x.uid==='${r.uid}')})"><i class="ti ti-arrow-left" style="font-size:15px"></i> ${esc(r.name)}</div>
      <div class="detail-banner">
        <div class="pnum" style="background:${A.fill};color:${A.ink}">${p.id+1}</div>
        <div><h2>Ревью: ${p.name}</h2>
        <div class="meta"><div class="avatar" style="width:24px;height:24px;font-size:10px">${initials(r.name)}</div><span style="font-size:13px;color:var(--ink-2)">${esc(r.name)}</span></div></div>
      </div>
    </div>

    <div class="sec"><div class="sec-title"><i class="ti ti-target" style="color:${A.bar};font-size:18px"></i> Учебные цели</div>
    <div class="sec-hint">Проверь каждую цель — подтверди или оставь замечание</div>
    ${p.objectives.map(o=>{
      const od=d.objectives[o.id]||{ok:null,comment:''};
      const cls=od.ok===true?'rv-ok':od.ok===false?'rv-fail':'';
      const checked=r.checked[o.id];
      return `<div class="rv-obj ${cls}" id="rvo-${o.id}">
        <div class="rv-obj-top">
          <div class="rv-obj-tx"><b>${o.verb}</b> ${o.text}
            <div class="rv-obj-analyst"><i class="ti ti-${checked?'circle-check':'circle'}" style="font-size:11px"></i> аналитик: ${checked?'отмечено как освоенное':'не отмечено'}</div>
          </div>
          <div class="rv-btns">
            <button class="${od.ok===true?'rv-on-ok':''}" onclick="setRvObj('${o.id}',true)"><i class="ti ti-check"></i></button>
            <button class="${od.ok===false?'rv-on-fail':''}" onclick="setRvObj('${o.id}',false)"><i class="ti ti-x"></i></button>
          </div>
        </div>
        ${od.ok===false?`<div class="rv-comment"><textarea placeholder="Что нужно доработать…" onchange="setRvObjComment('${o.id}',this.value)">${esc(od.comment)}</textarea></div>`:''}
      </div>`;
    }).join('')}</div>

    <div class="sec"><div class="sec-title"><i class="ti ti-paperclip" style="color:${A.bar};font-size:18px"></i> Артефакты (${ev.length})</div>
    <div class="sec-hint">Открой каждую ссылку, проверь содержимое</div>
    ${ev.length?ev.map((e,i)=>{
      const ad=d.artifacts[i]||{ok:null,comment:''};
      const cls=ad.ok===true?'rv-ok':ad.ok===false?'rv-fail':'';
      return `<div class="rv-obj ${cls}" id="rva-${i}">
        <div class="rv-obj-top">
          <div class="rv-obj-tx"><a href="${esc(e.url)}" target="_blank" rel="noopener" style="font-weight:600">${esc(e.label||e.url)}</a><br><small style="color:var(--ink-3)">${esc(e.url)}</small></div>
          <div class="rv-btns">
            <button class="${ad.ok===true?'rv-on-ok':''}" onclick="setRvArt(${i},true)"><i class="ti ti-check"></i></button>
            <button class="${ad.ok===false?'rv-on-fail':''}" onclick="setRvArt(${i},false)"><i class="ti ti-x"></i></button>
          </div>
        </div>
        ${ad.ok===false?`<div class="rv-comment"><textarea placeholder="Что не так с артефактом…" onchange="setRvArtComment(${i},this.value)">${esc(ad.comment)}</textarea></div>`:''}
      </div>`;
    }).join(''):'<div class="ev-empty">Артефакты не приложены</div>'}</div>

    <div class="rv-summary">
      <h4><i class="ti ti-send" style="color:var(--teal)"></i> Итог проверки</h4>
      <textarea id="rvNote" placeholder="Общий комментарий (необязательно)"></textarea>
      <div class="rv-actions">
        <button class="btn btn-warn" onclick="submitReview('changes')"><i class="ti ti-arrow-back-up"></i> На доработку</button>
        <button class="btn btn-ok" style="flex:1;justify-content:center" ${canApprove?'':`disabled title="Подтверди все цели и артефакты"`} onclick="submitReview('approve')"><i class="ti ti-check"></i> Принять этап</button>
      </div>
    </div>
    <div style="padding-bottom:50px"></div>
  </div>`;
}
window.setRvObj=function(id,ok){
  if(!state._rvDraft)return;
  state._rvDraft.objectives[id].ok=ok;
  renderReview();
};
window.setRvObjComment=function(id,val){
  if(!state._rvDraft)return;
  state._rvDraft.objectives[id].comment=val;
};
window.setRvArt=function(idx,ok){
  if(!state._rvDraft)return;
  state._rvDraft.artifacts[idx].ok=ok;
  renderReview();
};
window.setRvArtComment=function(idx,val){
  if(!state._rvDraft)return;
  state._rvDraft.artifacts[idx].comment=val;
};
window.submitReview=async function(decision){
  const d=state._rvDraft;if(!d)return;
  const note=(document.getElementById('rvNote')||{}).value||'';
  const review={by:state.mgr,at:Date.now(),decision,note:note.trim(),objectives:{},artifacts:{}};
  Object.keys(d.objectives).forEach(id=>{
    const o=d.objectives[id];
    if(o.ok!==null)review.objectives[id]={ok:o.ok,comment:o.comment||''};
  });
  Object.keys(d.artifacts).forEach(i=>{
    const a=d.artifacts[i];
    if(a.ok!==null)review.artifacts[i]={ok:a.ok,comment:a.comment||''};
  });
  if(DEMO){
    const rec=state.roster.find(x=>x.uid===d.uid);
    if(rec){rec.status[d.pid]=decision==='approve'?'done':'changes';rec.review[d.pid]=review;}
    state.rec=rec;toast('Демо-режим — изменения не сохраняются');go('mgrDetail');return;
  }
  root().innerHTML=loadingHTML('Сохраняю решение…');
  const rec=await dbLoadOne(d.uid);
  if(!rec){toast('Запись не найдена');state.roster=await dbLoadRoster();go('manager');return;}
  rec.status[d.pid]=decision==='approve'?'done':'changes';
  rec.review[d.pid]=review;
  const ok=await dbSave(rec);
  if(!ok)toast('Не удалось сохранить решение');
  state.roster=await dbLoadRoster();
  state.rec=state.roster.find(x=>x.uid===d.uid)||rec;
  go('mgrDetail');
};

function renderMgrDetail(){
  const r=state.rec,tot=countAll(r),pct=Math.round(tot/TOTAL*100),ap=approvedCount(r);
  root().innerHTML=topbar()+`<div class="shell fade">
    <div class="detail-head"><div class="crumb" onclick="backToMgr()"><i class="ti ti-arrow-left" style="font-size:15px"></i> Вся команда</div>
    <div class="detail-banner"><div class="avatar" style="width:48px;height:48px;font-size:17px">${initials(r.name)}</div>
    <div><h2>${esc(r.name)}</h2><div class="meta"><span class="tag" style="background:var(--teal-soft);color:var(--teal-deep)">${pct}% · принято ${ap}/${PHASES.length}</span>${r.baselinePct!=null?`<span class="tag" style="background:var(--paper);color:var(--ink-2);border:1px solid var(--line)"><i class="ti ti-flag" style="font-size:11px"></i> старт ${r.baselinePct}%</span>`:''}${r.updated?`<span class="tag" style="background:var(--paper);color:var(--ink-2);border:1px solid var(--line)">обновлено ${timeAgo(r.updated)}</span>`:''}</div></div></div></div>
    ${PHASES.map(p=>{
      const c=phaseDone(r,p),t=p.objectives.length,A=ACCENT[p.accent],st=phStatus(r,p),ev=r.evidence[p.id]||[],rv=r.review[p.id];
      return `<div class="rev ${st==='done'?'rev-done':st==='review'?'rev-review':st==='changes'?'rev-changes':'rev-progress'}" style="margin:18px 0">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><span class="pnum" style="width:30px;height:30px;font-size:14px;border-radius:8px;background:${A.fill};color:${A.ink}">${p.id+1}</span><div style="flex:1"><div style="font-family:var(--font-d);font-size:16px;font-weight:500">${p.name}</div><div style="font-size:12px;color:var(--ink-3)">${c}/${t} целей</div></div>${statusBadge(st)}</div>
        <div style="font-size:12px;font-weight:600;color:var(--ink-3);margin:10px 0 6px">Артефакты (${ev.length})</div>
        ${ev.length?ev.map(e=>`<div class="ev-item"><div class="ev-ic"><i class="ti ti-link"></i></div><div class="ev-body"><a href="${esc(e.url)}" target="_blank" rel="noopener">${esc(e.label||e.url)}</a><small>${esc(e.url)}</small></div></div>`).join(''):'<div class="ev-empty" style="padding:11px">Артефакты не приложены</div>'}
        ${rv&&rv.note?`<div class="note">${esc(rv.note)}</div><div class="by">${st==='done'?'Принял':'Вернул'}: ${esc(rv.by)}${rv.at?' · '+timeAgo(rv.at):''}</div>`:''}
        ${st==='review'?`<div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-ok btn-sm" onclick="openReviewFromDetail('${r.uid}',${p.id})"><i class="ti ti-eye"></i> Проверить этап</button></div>`:''}
      </div>`;
    }).join('')}
    <div style="padding-bottom:50px"></div></div>`;
}
window.backToMgr=function(){go('manager');};
window.decide=function(uid,pid,kind){
  state._decision={uid,pid,kind};
  const isAppr=kind==='approve';
  root().innerHTML+=`<div class="modal-bg fade" id="decModal"><div class="modal">
    <h3>${isAppr?'Принять этап?':'Вернуть на доработку?'}</h3>
    <p>${isAppr?'Этап будет помечен как принятый. Можно оставить комментарий аналитику.':'Этап вернётся аналитику. Опиши, что нужно доработать.'}</p>
    <textarea id="decNote" placeholder="${isAppr?'Комментарий (необязательно)':'Что доработать…'}"></textarea>
    <div style="display:flex;gap:10px"><button class="btn btn-ghost" onclick="closeDec()">Отмена</button>
    <button class="btn ${isAppr?'btn-ok':'btn-warn'}" style="flex:1;justify-content:center" onclick="confirmDecide()">${isAppr?'Принять':'Вернуть'}</button></div>
  </div></div>`;
  setTimeout(()=>{const t=document.getElementById('decNote');if(t)t.focus();},50);
};
window.closeDec=function(){const m=document.getElementById('decModal');if(m)m.remove();};
window.confirmDecide=async function(){
  const {uid,pid,kind}=state._decision;
  const note=(document.getElementById('decNote').value||'').trim();
  closeDec();
  if(DEMO){
    const rec=state.roster.find(x=>x.uid===uid);
    if(rec){rec.status[pid]=kind==='approve'?'done':'changes';rec.review[pid]={by:state.mgr,at:Date.now(),decision:kind,note};}
    state.rec=rec;toast('Демо-режим — изменения не сохраняются');go('mgrDetail');return;
  }
  root().innerHTML=loadingHTML('Сохраняю решение…');
  const rec=await dbLoadOne(uid);
  if(!rec){toast('Запись не найдена');state.roster=await dbLoadRoster();go('manager');return;}
  rec.status[pid]=kind==='approve'?'done':'changes';
  rec.review[pid]={by:state.mgr,at:Date.now(),decision:kind,note};
  const ok=await dbSave(rec);
  if(!ok)toast('Не удалось сохранить решение');
  state.roster=await dbLoadRoster();
  state.rec=state.roster.find(x=>x.uid===uid)||rec;
  go('mgrDetail');
};

function timeAgo(ts){const d=Math.floor((Date.now()-ts)/1000);if(d<60)return 'только что';if(d<3600)return Math.floor(d/60)+' мин назад';if(d<86400)return Math.floor(d/3600)+' ч назад';return Math.floor(d/86400)+' дн назад';}

function render(){const v=state.view;if(v==='login')return renderLogin();if(v==='diag')return renderDiag();if(v==='dash')return renderDash();if(v==='phase')return renderPhase();if(v==='manager')return renderManager();if(v==='mgrDetail')return renderMgrDetail();if(v==='review')return renderReview();renderLogin();}
boot();
</script>
</body>
</html>
